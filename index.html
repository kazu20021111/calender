<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ふたりのカレンダー</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fdf6f0;--surface:#ffffff;--border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);
  --text:#1a1918;--muted:#7a7874;--hint:#b0ada8;
  --accent:#e8637a;--accent-bg:#fdf0f2;--accent-dark:#c44d63;
  --radius:10px;--radius-lg:16px;
}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
#loading-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;font-size:14px;color:var(--muted);}
#auth-screen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:16px}
.auth-card{background:var(--surface);border-radius:var(--radius-lg);padding:36px 32px;width:100%;max-width:380px;border:1px solid var(--border)}
.auth-logo{text-align:center;font-size:28px;margin-bottom:6px}
.auth-title{text-align:center;font-size:18px;font-weight:700;color:var(--accent);margin-bottom:4px}
.auth-sub{text-align:center;font-size:12px;color:var(--muted);margin-bottom:28px}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:99px;padding:3px;margin-bottom:24px}
.auth-tab{flex:1;padding:7px;border:none;border-radius:99px;font-family:inherit;font-size:13px;background:transparent;color:var(--muted);cursor:pointer;transition:.15s}
.auth-tab.active{background:var(--surface);color:var(--accent);font-weight:500}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
.field input{width:100%;padding:10px 12px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:inherit;font-size:14px;background:var(--bg);outline:none;transition:.15s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,99,122,0.12)}
.btn-primary{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:.15s;margin-top:4px}
.btn-primary:hover{background:var(--accent-dark)}
.btn-primary:disabled{opacity:0.6;cursor:not-allowed}
.auth-msg{font-size:12px;text-align:center;margin-top:12px;min-height:18px;color:var(--accent)}
.auth-msg.err{color:#d94040}
#app-screen{display:none}
header{background:var(--surface);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;padding:0 20px;gap:8px;position:sticky;top:0;z-index:100}
.header-logo{font-size:15px;font-weight:700;color:var(--accent)}
.header-user{font-size:12px;color:var(--muted);margin-left:auto;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}
.btn-logout{font-size:12px;padding:5px 12px;border:1px solid var(--border-md);border-radius:99px;background:transparent;color:var(--muted);cursor:pointer;font-family:inherit;transition:.12s;flex-shrink:0}
.btn-logout:hover{background:var(--bg);color:var(--text)}
.anniversary-banner{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.ann-item{display:flex;align-items:center;gap:6px;font-size:13px}
.ann-heart{color:var(--accent);font-size:16px}
.ann-days{font-size:18px;font-weight:700;color:var(--accent)}
.ann-label{font-size:12px;color:var(--muted)}
.ann-setup{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline;margin-left:auto;flex-shrink:0}
.view-tabs{display:flex;gap:4px;padding:16px 16px 0;max-width:680px;margin:0 auto}
.view-tab{flex:1;padding:8px;border:1px solid var(--border-md);border-radius:var(--radius);background:transparent;font-family:inherit;font-size:13px;color:var(--muted);cursor:pointer;transition:.12s;text-align:center}
.view-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:500}
main{max-width:680px;margin:16px auto;padding:0 16px}
.cal-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;margin-bottom:20px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.cal-title{font-size:16px;font-weight:700;cursor:pointer;color:var(--accent)}
.cal-title:hover{text-decoration:underline}
.btn-nav{border:1px solid var(--border-md);background:transparent;border-radius:var(--radius);padding:5px 12px;cursor:pointer;color:var(--text);font-size:14px;transition:.12s}
.btn-nav:hover{background:var(--bg)}
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed}
.cal-head th{font-size:12px;font-weight:500;color:var(--muted);padding:8px 4px;text-align:center}
.cal-head th:first-child{color:#e05555}
.cal-head th:last-child{color:#4477dd}
.cal-cell{vertical-align:top;padding:4px;border-top:1px solid var(--border);min-height:76px;cursor:pointer;transition:.1s}
.cal-cell:hover{background:var(--accent-bg)}
.cal-cell.today{background:#fff5f7}
.cal-cell.other-month .cal-num{opacity:0.28}
.cal-num{font-size:12px;font-weight:500;padding:2px 5px;border-radius:99px;display:inline-block;min-width:22px;text-align:center}
.cal-cell.today .cal-num{background:var(--accent);color:#fff}
.cal-cell.ann-day .cal-num{background:var(--accent);color:#fff;outline:2px solid var(--accent-dark)}
.cal-event{font-size:11px;padding:2px 5px;border-radius:4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--accent-bg);color:var(--accent-dark)}
.cal-event.saving{opacity:0.5}
.cal-more{font-size:10px;color:var(--hint);padding:1px 5px}
#year-view{display:none}
.year-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 0;margin-bottom:12px}
.year-title{font-size:18px;font-weight:700}
.year-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.mini-cal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px;cursor:pointer;transition:.12s}
.mini-cal:hover{border-color:var(--accent);background:var(--accent-bg)}
.mini-cal-title{font-size:13px;font-weight:500;text-align:center;margin-bottom:6px;color:var(--text)}
.mini-cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.mini-day{font-size:9px;text-align:center;padding:1px 0;border-radius:2px;color:var(--muted)}
.mini-day.has-event{background:var(--accent-bg);color:var(--accent-dark);font-weight:500}
.mini-day.is-today{background:var(--accent);color:#fff;border-radius:99px}
.mini-day.is-ann{background:var(--accent);color:#fff;border-radius:99px;outline:1px solid var(--accent-dark)}
.mini-day.sun{color:#e05555}
.mini-day.sat{color:#4477dd}
.mini-day.other{opacity:0.2}
.mini-head{font-size:8px;text-align:center;color:var(--hint);padding:1px 0}
.panel-card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.panel-header{padding:14px 20px;border-bottom:1px solid var(--border)}
.panel-title{font-size:14px;font-weight:700}
.add-form{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.add-form input[type="text"]{flex:1;min-width:140px;padding:8px 12px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:inherit;font-size:13px;background:var(--bg);outline:none}
.add-form input[type="text"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,99,122,0.12)}
.add-form textarea{width:100%;padding:8px 12px;border:1px solid var(--border-md);border-radius:var(--radius);font-family:inherit;font-size:13px;background:var(--bg);resize:none;outline:none;height:60px}
.add-form textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(232,99,122,0.12)}
.btn-add{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius);font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-add:hover{background:var(--accent-dark)}
.event-list{padding:8px 0;min-height:48px}
.event-item{display:flex;align-items:flex-start;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border)}
.event-item:last-child{border-bottom:none}
.event-item.saving{opacity:0.5}
.event-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:5px}
.event-body{flex:1}
.event-title-text{font-size:14px;font-weight:500}
.event-memo{font-size:12px;color:var(--muted);margin-top:2px}
.event-who{font-size:11px;color:var(--hint);margin-top:2px}
.btn-del{border:none;background:transparent;color:var(--hint);cursor:pointer;padding:2px 6px;border-radius:4px;font-size:14px;line-height:1;transition:.1s}
.btn-del:hover{color:#d94040;background:#fdf0f0}
.empty-day{text-align:center;padding:2rem 0;color:var(--hint);font-size:13px}
.no-date{text-align:center;padding:2rem 0;color:var(--hint);font-size:13px}
@media(max-width:480px){.auth-card{padding:28px 20px}.year-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div id="loading-screen">読み込み中…</div>

<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo">💑</div>
    <div class="auth-title">ふたりのカレンダー</div>
    <div class="auth-sub">二人だけの予定を共有しよう</div>
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">ログイン</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">新規登録</button>
    </div>
    <div class="field"><label>メールアドレス</label><input type="email" id="email" placeholder="example@email.com" /></div>
    <div class="field"><label>パスワード</label><input type="password" id="password" placeholder="6文字以上" onkeydown="if(event.key==='Enter')submitAuth()" /></div>
    <button class="btn-primary" id="auth-btn" onclick="submitAuth()">ログイン</button>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<div id="app-screen">
  <header>
    <div class="header-logo">💑 ふたりのカレンダー</div>
    <div class="header-user" id="user-email"></div>
    <button class="btn-logout" id="logout-btn">ログアウト</button>
  </header>
  <div class="anniversary-banner">
    <div id="ann-display" class="ann-item">
      <span class="ann-heart">♥</span>
      <span class="ann-label">記念日を設定してください</span>
    </div>
    <span class="ann-setup" id="ann-setup-btn">設定する</span>
  </div>
  <div class="view-tabs">
    <button class="view-tab active" id="tab-month" onclick="switchView('month')">月</button>
    <button class="view-tab" id="tab-year" onclick="switchView('year')">年</button>
  </div>
  <main>
    <div id="month-view">
      <div class="cal-card">
        <div class="cal-nav">
          <button class="btn-nav" onclick="calMove(-1)">◀</button>
          <div class="cal-title" id="calTitle" onclick="switchView('year')"></div>
          <button class="btn-nav" onclick="calMove(1)">▶</button>
        </div>
        <table class="cal-table">
          <thead><tr class="cal-head" id="calHead"></tr></thead>
          <tbody id="calBody"></tbody>
        </table>
      </div>
      <div class="panel-card">
        <div class="panel-header"><div class="panel-title" id="panelTitle">日付を選んで予定を追加</div></div>
        <div id="panelContent"><div class="no-date">カレンダーの日付をタップしてください</div></div>
      </div>
    </div>
    <div id="year-view">
      <div class="year-nav">
        <button class="btn-nav" onclick="yearMove(-1)">◀</button>
        <div class="year-title" id="yearTitle"></div>
        <button class="btn-nav" onclick="yearMove(1)">▶</button>
      </div>
      <div class="year-grid" id="yearGrid"></div>
    </div>
  </main>
</div>

<script>
const SUPABASE_URL='https://lzwhirsribfvquuxnxus.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6d2hpcnNyaWJmdnF1dXhueHVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNDE1NTMsImV4cCI6MjA5NjkxNzU1M30.0juBMNtVrYdjeeK2uvBN_9aZ3QVZhnlzuUKPLmohSTw';

let sb, currentUser=null, calYear, calMonth, yearViewYear, selectedDate=null, events=[], authMode='login', tempId=0, currentView='month', anniversaryDate=null;

const now=new Date(); calYear=now.getFullYear(); calMonth=now.getMonth(); yearViewYear=now.getFullYear();

function todayStr(){return localDateStr(new Date());}
function localDateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dateLabel(ds){const[y,m,d]=ds.split('-');return `${y}年${parseInt(m)}月${parseInt(d)}日`;}

function showScreen(name){
  document.getElementById('loading-screen').style.display='none';
  document.getElementById('auth-screen').style.display=name==='auth'?'flex':'none';
  document.getElementById('app-screen').style.display=name==='app'?'block':'none';
}

function switchView(v){
  currentView=v;
  document.getElementById('month-view').style.display=v==='month'?'block':'none';
  document.getElementById('year-view').style.display=v==='year'?'block':'none';
  document.getElementById('tab-month').classList.toggle('active',v==='month');
  document.getElementById('tab-year').classList.toggle('active',v==='year');
  if(v==='year'){yearViewYear=calYear;renderYear();}
}

// 記念日
function updateAnniversaryDisplay(){
  const el=document.getElementById('ann-display');
  if(!anniversaryDate){
    el.innerHTML=`<span class="ann-heart">♥</span><span class="ann-label">記念日を設定してください</span>`;
    return;
  }
  const ann=new Date(anniversaryDate+'T00:00:00');
  const today=new Date();today.setHours(0,0,0,0);
  const diffDays=Math.floor((today-ann)/86400000);
  const nextAnn=new Date(today.getFullYear(),ann.getMonth(),ann.getDate());
  if(nextAnn<today)nextAnn.setFullYear(nextAnn.getFullYear()+1);
  const daysToNext=Math.floor((nextAnn-today)/86400000);
  el.innerHTML=`<span class="ann-heart">♥</span>
    <div class="ann-item"><span class="ann-days">${diffDays}</span><span class="ann-label">日目</span></div>
    <div class="ann-item" style="margin-left:12px;"><span class="ann-label">次の記念日まで</span><span class="ann-days" style="margin-left:4px;">${daysToNext}</span><span class="ann-label">日</span></div>`;
}

async function loadAnniversary(){
  const{data}=await sb.from('settings').select('anniversary_date').eq('user_id',currentUser.id).single();
  if(data&&data.anniversary_date){
    anniversaryDate=data.anniversary_date;
    updateAnniversaryDisplay();
  }
}

async function setupAnniversary(){
  const d=prompt('付き合い始めた日を入力してください（例：2024-03-14）',anniversaryDate||'');
  if(d&&/^\d{4}-\d{2}-\d{2}$/.test(d)){
    anniversaryDate=d;
    await sb.from('settings').upsert({user_id:currentUser.id,anniversary_date:d},{onConflict:'user_id'});
    updateAnniversaryDisplay();
    renderCal();
  }
}

function getAnniversaryDates(year){
  if(!anniversaryDate)return new Set();
  const ann=new Date(anniversaryDate+'T00:00:00');
  const set=new Set();
  set.add(`${year}-${String(ann.getMonth()+1).padStart(2,'0')}-${String(ann.getDate()).padStart(2,'0')}`);
  for(let i=100;i<=3650;i+=100){
    const d=new Date(ann);d.setDate(d.getDate()+i);
    if(d.getFullYear()===year)set.add(localDateStr(d));
  }
  return set;
}

async function initApp(user){
  currentUser=user;
  document.getElementById('user-email').textContent=user.email;
  await Promise.all([loadEvents(),loadAnniversary()]);
  renderCal();
  showScreen('app');
}

function switchTab(mode){
  authMode=mode;
  document.getElementById('tab-login').classList.toggle('active',mode==='login');
  document.getElementById('tab-signup').classList.toggle('active',mode==='signup');
  document.getElementById('auth-btn').textContent=mode==='login'?'ログイン':'新規登録';
  document.getElementById('auth-msg').textContent='';
}

async function submitAuth(){
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const btn=document.getElementById('auth-btn');
  if(!email||!password){showMsg('メールとパスワードを入力してください',true);return;}
  btn.disabled=true;btn.textContent='処理中…';
  const res=authMode==='login'
    ?await sb.auth.signInWithPassword({email,password})
    :await sb.auth.signUp({email,password});
  btn.disabled=false;
  btn.textContent=authMode==='login'?'ログイン':'新規登録';
  if(res.error){
    const m={'Invalid login credentials':'メールまたはパスワードが違います','User already registered':'このメールはすでに登録済みです'};
    showMsg(m[res.error.message]||res.error.message,true);
  }else if(res.data.session){
    await initApp(res.data.session.user);
  }else{
    showMsg('確認メールを送りました',false);
  }
}

function showMsg(text,isErr){
  const el=document.getElementById('auth-msg');
  el.textContent=text;
  el.className='auth-msg'+(isErr?' err':'');
}

async function logout(){
  await sb.auth.signOut();
  currentUser=null;events=[];selectedDate=null;anniversaryDate=null;
  showScreen('auth');
}

async function loadEvents(){
  const{data,error}=await sb.from('events').select('*').order('created_at');
  if(!error)events=data||[];
}

async function addEvent(){
  const titleEl=document.getElementById('newTitle');
  const memoEl=document.getElementById('newMemo');
  const title=titleEl.value.trim();
  if(!title||!selectedDate)return;
  const tmp={id:'tmp-'+(++tempId),user_id:currentUser.id,title,date:selectedDate,memo:memoEl.value.trim()||null,saving:true};
  events.push(tmp);titleEl.value='';memoEl.value='';
  renderPanel();renderCal();
  const{data,error}=await sb.from('events').insert({user_id:currentUser.id,title:tmp.title,date:tmp.date,memo:tmp.memo}).select().single();
  const idx=events.findIndex(e=>e.id===tmp.id);
  if(error){if(idx!==-1)events.splice(idx,1);alert('追加できませんでした: '+error.message);}
  else{if(idx!==-1)events[idx]=data;}
  renderPanel();renderCal();
}

async function deleteEvent(id){
  const backup=events.find(e=>e.id===id);
  events=events.filter(e=>e.id!==id);
  renderPanel();renderCal();
  const{error}=await sb.from('events').delete().eq('id',id).eq('user_id',currentUser.id);
  if(error){if(backup)events.push(backup);alert('削除できませんでした');renderPanel();renderCal();}
}

function calMove(d){
  calMonth+=d;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCal();
}

function yearMove(d){yearViewYear+=d;renderYear();}

function renderCal(){
  document.getElementById('calTitle').textContent=calYear+'年'+(calMonth+1)+'月 ▾';
  document.getElementById('calHead').innerHTML=['日','月','火','水','木','金','土'].map(d=>`<th>${d}</th>`).join('');
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const lastDate=new Date(calYear,calMonth+1,0).getDate();
  const today=todayStr();
  const annDates=getAnniversaryDates(calYear);
  let cells=[];
  for(let i=0;i<firstDay;i++){const d=new Date(calYear,calMonth,1-firstDay+i);cells.push({ds:localDateStr(d),cur:false,num:d.getDate()});}
  for(let d=1;d<=lastDate;d++)cells.push({ds:localDateStr(new Date(calYear,calMonth,d)),cur:true,num:d});
  let nd=1;while(cells.length%7!==0){const d=new Date(calYear,calMonth+1,nd++);cells.push({ds:localDateStr(d),cur:false,num:d.getDate()});}
  let rows='';
  for(let r=0;r<cells.length/7;r++){
    rows+='<tr>';
    for(let c=0;c<7;c++){
      const cell=cells[r*7+c];
      const isToday=cell.ds===today,isSel=cell.ds===selectedDate,isAnn=annDates.has(cell.ds)&&cell.cur;
      const dayEvs=events.filter(e=>e.date===cell.ds);
      rows+=`<td class="cal-cell${isToday?' today':''}${isAnn?' ann-day':''}${!cell.cur?' other-month':''}"
        style="${isSel?'background:var(--accent-bg);outline:2px solid var(--accent);outline-offset:-2px;border-radius:4px;':''}"
        onclick="selectDate('${cell.ds}')">
        <span class="cal-num">${cell.num}</span>
        ${isAnn&&!isToday?`<div style="font-size:9px;color:var(--accent);margin-top:1px;">♥</div>`:''}
        ${dayEvs.slice(0,2).map(e=>`<div class="cal-event${e.saving?' saving':''}">${esc(e.title)}</div>`).join('')}
        ${dayEvs.length>2?`<div class="cal-more">+${dayEvs.length-2}</div>`:''}
      </td>`;
    }
    rows+='</tr>';
  }
  document.getElementById('calBody').innerHTML=rows;
}

function renderYear(){
  document.getElementById('yearTitle').textContent=yearViewYear+'年';
  const today=todayStr();
  const annDates=getAnniversaryDates(yearViewYear);
  const grid=document.getElementById('yearGrid');
  grid.innerHTML='';
  for(let m=0;m<12;m++){
    const firstDay=new Date(yearViewYear,m,1).getDay();
    const lastDate=new Date(yearViewYear,m+1,0).getDate();
    let cells=[];
    for(let i=0;i<firstDay;i++)cells.push({num:'',cur:false,ds:'',dow:i});
    for(let d=1;d<=lastDate;d++){const ds=localDateStr(new Date(yearViewYear,m,d));cells.push({num:d,cur:true,ds,dow:(firstDay+d-1)%7});}
    while(cells.length%7!==0)cells.push({num:'',cur:false,ds:'',dow:cells.length%7});
    const hasEv=events.some(e=>e.date&&e.date.startsWith(`${yearViewYear}-${String(m+1).padStart(2,'0')}`));
    const div=document.createElement('div');
    div.className='mini-cal';
    div.dataset.month=m;
    div.onclick=function(){calYear=yearViewYear;calMonth=parseInt(this.dataset.month);switchView('month');};
    let html=`<div class="mini-cal-title">${m+1}月${hasEv?' <span style="color:var(--accent)">●</span>':''}</div><div class="mini-cal-grid">`;
    ['日','月','火','水','木','金','土'].forEach(d=>{html+=`<div class="mini-head">${d}</div>`;});
    cells.forEach(cell=>{
      const isToday=cell.ds===today,isAnn=cell.ds&&annDates.has(cell.ds),hasEvent=cell.ds&&events.some(e=>e.date===cell.ds);
      const cls=['mini-day',cell.dow===0?'sun':cell.dow===6?'sat':'',!cell.cur?'other':'',isToday?'is-today':'',isAnn&&!isToday?'is-ann':'',hasEvent&&!isToday&&!isAnn?'has-event':''].filter(Boolean).join(' ');
      html+=`<div class="${cls}">${cell.num}</div>`;
    });
    html+=`</div>`;
    div.innerHTML=html;
    grid.appendChild(div);
  }
}

function selectDate(ds){selectedDate=ds;renderCal();renderPanel();}

function renderPanel(){
  if(!selectedDate)return;
  document.getElementById('panelTitle').textContent=dateLabel(selectedDate)+' の予定';
  const dayEvs=events.filter(e=>e.date===selectedDate);
  const isMine=e=>e.user_id===currentUser.id;
  document.getElementById('panelContent').innerHTML=`
    <div class="add-form">
      <input type="text" id="newTitle" placeholder="予定のタイトル" onkeydown="if(event.key==='Enter')addEvent()" />
      <button class="btn-add" onclick="addEvent()">追加</button>
      <textarea id="newMemo" placeholder="メモ（任意）"></textarea>
    </div>
    <div class="event-list">
      ${dayEvs.length===0?'<div class="empty-day">この日の予定はまだありません</div>'
        :dayEvs.map(e=>`
          <div class="event-item${e.saving?' saving':''}">
            <div class="event-dot" style="${isMine(e)?'':'background:#7a7874;'}"></div>
            <div class="event-body">
              <div class="event-title-text">${esc(e.title)}</div>
              ${e.memo?`<div class="event-memo">${esc(e.memo)}</div>`:''}
              <div class="event-who">${e.saving?'保存中…':isMine(e)?'あなた':'パートナー'}</div>
            </div>
            ${isMine(e)&&!e.saving?`<button class="btn-del" onclick="deleteEvent('${e.id}')">✕</button>`:''}
          </div>`).join('')}
    </div>`;
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

(async()=>{
  await new Promise((resolve,reject)=>{
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
    s.onload=resolve;s.onerror=reject;
    document.head.appendChild(s);
  });

  sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY,{
    auth:{
      persistSession:true,
      storageKey:'couple-cal-v2',
      storage:window.localStorage,
      autoRefreshToken:true,
      detectSessionInUrl:false,
    }
  });

  document.getElementById('logout-btn').addEventListener('click',logout);
  document.getElementById('ann-setup-btn').addEventListener('click',setupAnniversary);

  // セッション復元を試みる
  const{data:{session}}=await sb.auth.getSession();
  if(session){
    await initApp(session.user);
  } else {
    // リフレッシュトークンで再試行
    const{data:refreshed}=await sb.auth.refreshSession();
    if(refreshed.session){
      await initApp(refreshed.session.user);
    } else {
      showScreen('auth');
    }
  }
})();
</script>
